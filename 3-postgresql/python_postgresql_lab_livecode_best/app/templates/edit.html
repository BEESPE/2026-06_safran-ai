<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>
</head>
<body>

<h1>Edit Product</h1>

<form action="/update/{{ product[0] }}" method="post">

    <label>Name:</label><br>
    <input
        type="text"
        name="name"
        value="{{ product[1] }}"
        required>
    <br><br>

    <label>Price:</label><br>
    <input
        type="number"
        step="0.01"
        name="price"
        value="{{ product[2] }}"
        required>
    <br><br>

    <label>Stock:</label><br>
    <input
        type="number"
        name="stock"
        value="{{ product[3] }}"
        required>
    <br><br>

    <button type="submit">Update Product</button>

</form>

<br>

<a href="/">Back to Product List</a>

</body>
</html>
