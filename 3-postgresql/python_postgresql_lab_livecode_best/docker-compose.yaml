version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres_inventory

    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

    restart: always

  app:
    build: ./app

    container_name: inventory_app

    ports:
      - "5000:5000"

    command: python main.py

    depends_on:
      - postgres

    environment:
      DB_HOST: postgres
      DB_NAME: inventory_db
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_PORT: 5432
      FLASK_DEBUG: "1"
    
    stdin_open: true
    tty: true

volumes:
  postgres_data: