version: "3.8"

services:
  db:
    image: postgres:16
    container_name: postgres_inventory
    restart: always

    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: ./app
    container_name: python_app

    depends_on:
      - db

    stdin_open: true
    tty: true

volumes:
  postgres_data:
